<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1020" />
    <title>Wheel — Options</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.7);
        --accent: #7c5cff;
        --ok: #34d399;
        --danger: #fb7185;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        --radius: 18px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font: 14px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell,
          Noto Sans, "Helvetica Neue", Arial;
        color: var(--text);
        background: radial-gradient(1000px 650px at 25% 10%, rgba(124, 92, 255, 0.22), transparent 55%),
          radial-gradient(900px 650px at 85% 0%, rgba(52, 211, 153, 0.16), transparent 55%),
          var(--bg);
      }
      a {
        color: inherit;
        text-underline-offset: 3px;
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 22px 18px 28px;
        display: grid;
        gap: 14px;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }
      header h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.2px;
      }
      .pill {
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        padding: 6px 10px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        user-select: none;
      }
      .card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .hd {
        padding: 14px 14px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .hd .title {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .hd .title strong {
        font-size: 13px;
      }
      .hd .title span {
        font-size: 12px;
        color: var(--muted);
      }
      .bd {
        padding: 14px;
        display: grid;
        gap: 14px;
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.22);
      }
      button:active {
        transform: translateY(1px);
      }
      button.primary {
        background: rgba(124, 92, 255, 0.18);
        border-color: rgba(124, 92, 255, 0.5);
      }
      button.danger {
        background: rgba(251, 113, 133, 0.14);
        border-color: rgba(251, 113, 133, 0.45);
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .ring {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.18);
        border-radius: 14px;
        padding: 12px;
        display: grid;
        gap: 10px;
      }
      label {
        display: grid;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      input,
      textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        padding: 10px 10px;
        outline: none;
      }
      textarea {
        min-height: 160px;
        resize: vertical;
        font: 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .hint {
        color: var(--muted);
        font-size: 12px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }
      .small {
        font-size: 12px;
        color: var(--muted);
      }
      kbd {
        font: 12px/1.1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        padding: 2px 6px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.25);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Wheel options</h1>
        <div class="row">
          <a class="pill" href="./index.html">Back to wheel</a>
        </div>
      </header>

      <section class="card">
        <div class="hd">
          <div class="title">
            <strong>Edit rings</strong>
            <span>One option per line. Changes are saved locally.</span>
          </div>
          <div class="actions">
            <button id="addRingBtn" type="button">Add ring</button>
            <button id="restoreBtn" class="danger" type="button">Restore defaults</button>
            <button id="saveBtn" class="primary" type="button">Save</button>
          </div>
        </div>
        <div class="bd">
          <div class="hint">
            Tip: On the wheel page, press <kbd>Space</kbd> to spin. This page uses
            <code>localStorage</code> only (no server).
          </div>
          <div class="grid" id="rings"></div>
        </div>
      </section>

      <div class="small">
        Storage key: <code>wheel:v1</code> • Max: 6 rings, 64 options per ring
      </div>
    </div>

    <script type="module">
      const STORAGE_KEY = "wheel:v1";

      const defaultConfig = {
        rings: [
          { name: "What", options: ["Coffee", "Tea", "Water", "Juice"] },
          { name: "Where", options: ["Home", "Office", "Cafe", "Outside"] },
          { name: "When", options: ["Now", "In 30 min", "Tonight", "Tomorrow"] },
        ],
      };

      function loadConfig() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return structuredClone(defaultConfig);
          const parsed = JSON.parse(raw);
          if (!parsed?.rings?.length) return structuredClone(defaultConfig);
          return parsed;
        } catch {
          return structuredClone(defaultConfig);
        }
      }

      function saveConfig(cfg) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
      }

      function normalizeOptions(rawText) {
        return String(rawText ?? "")
          .split(/\r?\n/g)
          .map((s) => s.trim())
          .filter(Boolean)
          .slice(0, 64);
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      const ringsEl = document.getElementById("rings");
      const saveBtn = document.getElementById("saveBtn");
      const restoreBtn = document.getElementById("restoreBtn");
      const addRingBtn = document.getElementById("addRingBtn");

      /** @type {{ rings: { name: string, options: string[] }[] }} */
      let config = loadConfig();

      function render() {
        ringsEl.innerHTML = "";
        const rings = config.rings.slice(0, 6);

        rings.forEach((ring, idx) => {
          const div = document.createElement("div");
          div.className = "ring";
          div.innerHTML = `
            <div class="row">
              <strong>${escapeHtml(ring.name || `Wheel ${idx + 1}`)}</strong>
              <button type="button" class="danger" data-remove="${idx}">Remove</button>
            </div>
            <label>
              Name
              <input data-name="${idx}" value="${escapeHtml(ring.name ?? "")}" placeholder="e.g. Where" />
            </label>
            <label>
              Options (one per line)
              <textarea data-options="${idx}" spellcheck="false" placeholder="Option 1&#10;Option 2&#10;Option 3">${escapeHtml(
                (ring.options ?? []).join("\n")
              )}</textarea>
            </label>
            <div class="hint">${(ring.options?.length ?? 0) || 0} options</div>
          `;
          ringsEl.appendChild(div);
        });
      }

      function readFormIntoConfig() {
        const next = { rings: [] };
        const ringCount = Math.min(6, config.rings.length);
        for (let i = 0; i < ringCount; i++) {
          const nameInput = document.querySelector(`[data-name="${i}"]`);
          const optionsText = document.querySelector(`[data-options="${i}"]`);
          const name = String(nameInput?.value ?? "").trim() || `Wheel ${i + 1}`;
          const options = normalizeOptions(optionsText?.value ?? "");
          next.rings.push({ name, options: options.length ? options : ["(empty)"] });
        }
        config = next;
      }

      ringsEl.addEventListener("click", (e) => {
        const btn = e.target?.closest?.("button[data-remove]");
        if (!btn) return;
        const idx = Number(btn.getAttribute("data-remove"));
        if (!Number.isFinite(idx)) return;
        config.rings.splice(idx, 1);
        if (config.rings.length === 0) config = structuredClone(defaultConfig);
        render();
      });

      saveBtn.addEventListener("click", () => {
        readFormIntoConfig();
        saveConfig(config);
        saveBtn.textContent = "Saved";
        setTimeout(() => (saveBtn.textContent = "Save"), 700);
      });

      restoreBtn.addEventListener("click", () => {
        config = structuredClone(defaultConfig);
        saveConfig(config);
        render();
      });

      addRingBtn.addEventListener("click", () => {
        if (config.rings.length >= 6) return;
        config.rings.push({ name: `Wheel ${config.rings.length + 1}`, options: ["Option A", "Option B"] });
        render();
      });

      render();

      // Offline availability (service worker)
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
